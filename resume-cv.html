<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume + CV</title>
  <link rel="stylesheet" href="./resources/index.css" />
  <link rel="icon" type="image/x-icon" href="./resources/favicon.png">
</head>

<body>
    <div id="grid">
        <section class="resume-title">
            <div class="project-title">Resume + CV</div><br>
            <div>
                <div class="category">
                <div class="type" onclick="toggleDoc('cv-doc', this)">CV <span class="toggle-icon">+</span></div>
                <div class="doc-download">
                 <a href="./resources/Avrie Allen—Resume 2026.pdf" download class="project-link">Download CV ↓</a>
                </div>
                </div>

                <div class="category">
                 <div class="type" onclick="toggleDoc('resume-doc', this)">Resume <span class="toggle-icon">+</span></div>
                   <div class="doc-download">
                    <a href="./resources/Avrie Allen—Resume 2026.pdf" download class="project-link">Download Resume ↓</a>
                </div>
                </div>
            </div>
            <br>
            <div class="back"><a href="index.html">← Back</a></div>
        </section>
        <section class="resume-second">
<div id="cv-doc" class="doc-viewer">
    <object data="./resources/avrie-allen-cv.pdf" type="application/pdf" width="100%" height="800">
    </object>
</div>

<div id="resume-doc" class="doc-viewer">
    <object data="./resources/avrie-allen-resume.pdf" type="application/pdf" width="100%" height="800">
    </object>
</div>
        </section>
        <section class="resume-third">
        </section>
    </div>

    <!--Mobile-->
    <div id="mobile-grid">
        <div>
        <div class="mobile-project-descriptions">
            <div class="project-title">Resume + CV</div><br>
            <div class="category">
            <div class="type" onclick="toggleDoc('cv-doc-mobile', this)">CV <span class="toggle-icon">+</span></div>
            </div>
            <div class="category">
            <div class="type" onclick="toggleDoc('resume-doc-mobile', this)">Resume <span class="toggle-icon">+</span></div>
            </div>
            <br>
            <div class="back"><a href="index.html">← Back</a></div>
        </div>
        </div>
        <div>
        <div class="mobile-project-images">
            <div id="cv-doc-mobile" class="doc-viewer">
                <iframe src="https://drive.google.com/file/d/CV_FILE_ID/preview"
                width="100%"
                height="800"
                allow="autoplay"></iframe>
            </div>

            <div id="resume-doc-mobile" class="doc-viewer">
                <iframe src="https://drive.google.com/file/d/RESUME_FILE_ID/preview"
                width="100%"
                height="800"
                allow="autoplay"></iframe>
            </div>
        </div>
        </div>
    </div>

<script>

function toggleDoc(id, el) {
    var target = document.getElementById(id);
    var icon = el.querySelector(".toggle-icon");
    var isOpen = target.classList.contains("open");

    var scope = target.closest("#grid, #mobile-grid");

    scope.querySelectorAll(".doc-viewer.open").forEach(function(doc) {
        doc.classList.remove("open");
    });
    scope.querySelectorAll(".doc-download.open").forEach(function(dl) {
        dl.classList.remove("open");
    });
    scope.querySelectorAll(".type .toggle-icon").forEach(function(i) {
        i.textContent = "+";
    });

    if (!isOpen) {
        target.classList.add("open");
        icon.textContent = "–";
        el.nextElementSibling.classList.add("open");
    }
}
</script>

</body>
</html>
